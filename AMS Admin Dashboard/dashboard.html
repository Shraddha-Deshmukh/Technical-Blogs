<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMS Admin — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Chart.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ── chart canvas ── */
    canvas { max-width: 100%; }

    /* ── Donut wrap ── */
    .donut-wrap { position:relative; display:flex; align-items:center; justify-content:center; }
    .donut-center { position:absolute; text-align:center; pointer-events:none; }
    .donut-center-num { font-family:var(--font-display); font-size:var(--text-2xl); font-weight:700; color:var(--text-primary); line-height:1; }
    .donut-center-label { font-size:var(--text-xs); color:var(--text-muted); }

    /* ── Report filter bar ── */
    .filter-bar { display:flex; flex-wrap:wrap; gap:var(--sp-3); align-items:center; padding:var(--sp-4) var(--sp-5); border-bottom:1px solid var(--glass-border); }

    /* ── CRUD toolbar ── */
    .crud-toolbar { display:flex; gap:var(--sp-3); align-items:center; flex-wrap:wrap; margin-bottom:var(--sp-5); }

    /* ── Notification filter ── */
    .notif-filter { display:flex; gap:var(--sp-2); padding:var(--sp-3) var(--sp-5); border-bottom:1px solid var(--glass-border); }

    /* ── Drawer ── */
    .drawer-backdrop { position:fixed; inset:0; z-index:400; background:rgba(8,11,24,0.6); backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity var(--dur) var(--ease); }
    .drawer-backdrop.show { opacity:1; pointer-events:all; }
    .drawer { position:fixed; top:0; right:0; bottom:0; width:480px; max-width:95vw; z-index:401; transform:translateX(100%); transition:transform 0.30s var(--ease); overflow-y:auto; padding:var(--sp-8); }
    .drawer-backdrop.show .drawer { transform:translateX(0); }
    .drawer-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--sp-6); }
    .drawer-title { font-family:var(--font-display); font-size:var(--text-xl); font-weight:700; color:var(--text-primary); }

    /* ── Member avatar cell ── */
    .member-cell { display:flex; align-items:center; gap:var(--sp-3); }
    .member-av { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }

    /* ── Pulse ring on live indicator ── */
    .live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--success); margin-right:6px; animation:pulse 2s infinite; }

    /* ── Export buttons group ── */
    .export-group { display:flex; gap:var(--sp-2); }

    /* ── Metric row ── */
    .metric-row { display:flex; align-items:center; justify-content:space-between; padding:var(--sp-3) 0; border-bottom:1px solid var(--glass-border); }
    .metric-row:last-child { border-bottom:none; }

    /* ── 3D glow card ── */
    .glow-card { position:relative; overflow:hidden; }
    .glow-card::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%, rgba(124,110,250,0.12), transparent 70%); pointer-events:none; }

    /* responsive tables on mobile */
    @media(max-width:640px){
      .hide-mobile { display:none; }
      .drawer { width:100%; }
    }
  </style>
</head>
<body>

<!-- App shell injected by shell.js -->
<div id="appShell"></div>

<!-- ════════════════════════════════════════════════════════
     SCREENS  (hidden until navigated)
════════════════════════════════════════════════════════ -->
<template id="allScreens">

  <!-- ══ SCREEN 1 — DASHBOARD ══════════════════════════════ -->
  <div class="screen active" id="screenDashboard">
    <div class="page-content">

      <!-- Welcome bar -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-8)">
        <div>
          <h1 style="font-family:var(--font-display);font-size:var(--text-2xl);font-weight:700;color:var(--text-primary)">Good morning, Shraddha 👋</h1>
          <p style="font-size:var(--text-sm);color:var(--text-muted);margin-top:4px">Tuesday, 10 March 2026 · Here's what's happening today</p>
        </div>
        <div style="display:flex;gap:var(--sp-3)">
          <button class="btn btn-ghost" onclick="showToast('info','Refreshing…','Dashboard data updated.')">🔄 Refresh</button>
          <button class="btn btn-primary" onclick="openMemberDrawer(null)">+ Add Member</button>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="stats-grid">
        <div class="glass stat-card glow-card" style="--card-accent:#7C6EFA;--card-accent2:#5A4FD6">
          <div class="stat-icon">👥</div>
          <div class="stat-label">Total Members</div>
          <div class="stat-value" id="statMembers">2,347</div>
          <span class="stat-delta up">↑ 12.4%</span>
          <div class="stat-sub">+260 this quarter</div>
        </div>
        <div class="glass stat-card glow-card" style="--card-accent:#00E5C9;--card-accent2:#00b8a0">
          <div class="stat-icon">📅</div>
          <div class="stat-label">Upcoming Events</div>
          <div class="stat-value">18</div>
          <span class="stat-delta up">↑ 3 new</span>
          <div class="stat-sub">Next: Spring Gala — Mar 22</div>
        </div>
        <div class="glass stat-card glow-card" style="--card-accent:#FFB347;--card-accent2:#e09020">
          <div class="stat-icon">💰</div>
          <div class="stat-label">Revenue YTD</div>
          <div class="stat-value">$287K</div>
          <span class="stat-delta up">↑ 18.7%</span>
          <div class="stat-sub">Target: $350K</div>
        </div>
        <div class="glass stat-card glow-card" style="--card-accent:#EF4444;--card-accent2:#c0392b">
          <div class="stat-icon">🔔</div>
          <div class="stat-label">Notifications</div>
          <div class="stat-value">5</div>
          <span class="stat-delta down">2 urgent</span>
          <div class="stat-sub">Last: 12 minutes ago</div>
        </div>
      </div>

      <!-- Charts row -->
      <div class="grid-6040" style="margin-bottom:var(--sp-8)">
        <!-- Revenue chart -->
        <div class="glass" style="padding:var(--sp-6)">
          <div class="section-header">
            <div>
              <div class="section-title">Revenue Overview</div>
              <div class="section-sub">Monthly revenue vs target</div>
            </div>
            <div class="tabs" style="margin:0">
              <div class="tab active" onclick="setChartRange('6m',this)">6M</div>
              <div class="tab" onclick="setChartRange('1y',this)">1Y</div>
              <div class="tab" onclick="setChartRange('all',this)">All</div>
            </div>
          </div>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#7C6EFA"></div>Revenue</div>
            <div class="legend-item"><div class="legend-dot" style="background:#00E5C9;opacity:.5"></div>Target</div>
          </div>
          <canvas id="revenueChart" height="200"></canvas>
        </div>
        <!-- Donut -->
        <div class="glass" style="padding:var(--sp-6)">
          <div class="section-header">
            <div>
              <div class="section-title">Membership</div>
              <div class="section-sub">By type</div>
            </div>
          </div>
          <div class="donut-wrap" style="height:180px;margin-bottom:var(--sp-4)">
            <canvas id="donutChart" style="max-height:180px"></canvas>
            <div class="donut-center">
              <div class="donut-center-num">2,347</div>
              <div class="donut-center-label">Total</div>
            </div>
          </div>
          <div id="donutLegend" style="display:flex;flex-direction:column;gap:var(--sp-2)"></div>
        </div>
      </div>

      <!-- Member growth + Timeline + Quick actions -->
      <div style="display:grid;grid-template-columns:1.2fr 1fr 0.8fr;gap:var(--sp-6);margin-bottom:var(--sp-8)">

        <!-- Member growth bar chart -->
        <div class="glass" style="padding:var(--sp-6)">
          <div class="section-header">
            <div class="section-title">Member Growth</div>
          </div>
          <canvas id="memberChart" height="180"></canvas>
        </div>

        <!-- Activity timeline -->
        <div class="glass" style="padding:var(--sp-6);overflow:hidden">
          <div class="section-header">
            <div class="section-title">Activity</div>
            <span style="font-size:var(--text-xs);color:var(--text-muted)"><span class="live-dot"></span>Live</span>
          </div>
          <div class="timeline" id="activityTimeline"></div>
        </div>

        <!-- Quick actions -->
        <div class="glass" style="padding:var(--sp-6)">
          <div class="section-title" style="margin-bottom:var(--sp-4)">Quick Actions</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3)">
            <div class="quick-action" onclick="openMemberDrawer(null)"><span class="quick-action-icon">👤</span>Add Member</div>
            <div class="quick-action" onclick="navigateTo('events')"><span class="quick-action-icon">📅</span>New Event</div>
            <div class="quick-action" onclick="navigateTo('reports')"><span class="quick-action-icon">📊</span>Reports</div>
            <div class="quick-action" onclick="showToast('success','Invoice sent!','Invoice #1089 sent to 48 members.')"><span class="quick-action-icon">📧</span>Send Invoice</div>
            <div class="quick-action" onclick="navigateTo('notifications')"><span class="quick-action-icon">🔔</span>Alerts</div>
            <div class="quick-action" onclick="showToast('info','Backup started','Full backup initiated.')"><span class="quick-action-icon">💾</span>Backup</div>
          </div>
        </div>
      </div>

      <!-- Top Members table + Revenue progress -->
      <div class="grid-6040">
        <div class="glass" style="overflow:hidden">
          <div style="padding:var(--sp-5) var(--sp-6);border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between">
            <div class="section-title">Top Members</div>
            <button class="btn btn-ghost btn-sm" onclick="navigateTo('members')">View All →</button>
          </div>
          <div class="table-wrap">
            <table id="topMembersTable"></table>
          </div>
        </div>
        <div class="glass" style="padding:var(--sp-6)">
          <div class="section-title" style="margin-bottom:var(--sp-5)">Target Progress</div>
          <div id="targetProgress"></div>
        </div>
      </div>

    </div>
  </div><!-- /screenDashboard -->


  <!-- ══ SCREEN 2 — REPORTS ════════════════════════════════ -->
  <div class="screen" id="screenReports">
    <div class="page-content">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-6)">
        <div>
          <h2 style="font-family:var(--font-display);font-size:var(--text-2xl);font-weight:700;color:var(--text-primary)">Reports &amp; Analytics</h2>
          <p style="font-size:var(--text-sm);color:var(--text-muted);margin-top:4px">Detailed insights across your association</p>
        </div>
        <div class="export-group">
          <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV</button>
          <button class="btn btn-ghost" onclick="exportPDF()">⬇ PDF</button>
          <button class="btn btn-primary" onclick="showToast('success','Report scheduled','Weekly report will be emailed Monday.')">📧 Schedule</button>
        </div>
      </div>

      <!-- KPI row -->
      <div class="stats-grid" style="margin-bottom:var(--sp-6)">
        <div class="glass stat-card" style="--card-accent:#7C6EFA">
          <div class="stat-icon">💰</div>
          <div class="stat-label">Total Revenue</div>
          <div class="stat-value">$287,450</div>
          <span class="stat-delta up">↑ 18.7%</span>
        </div>
        <div class="glass stat-card" style="--card-accent:#00E5C9">
          <div class="stat-icon">💳</div>
          <div class="stat-label">Dues Collected</div>
          <div class="stat-value">$142,800</div>
          <span class="stat-delta up">↑ 9.2%</span>
        </div>
        <div class="glass stat-card" style="--card-accent:#FF6B8A">
          <div class="stat-icon">⏳</div>
          <div class="stat-label">Pending Dues</div>
          <div class="stat-value">$28,340</div>
          <span class="stat-delta down">↓ 4 overdue</span>
        </div>
        <div class="glass stat-card" style="--card-accent:#FFB347">
          <div class="stat-icon">🎟</div>
          <div class="stat-label">Event Revenue</div>
          <div class="stat-value">$116,310</div>
          <span class="stat-delta up">↑ 31.4%</span>
        </div>
      </div>

      <!-- Revenue + attendance charts -->
      <div class="grid-2" style="margin-bottom:var(--sp-6)">
        <div class="glass" style="padding:var(--sp-6)">
          <div class="section-header">
            <div class="section-title">Revenue Trend</div>
            <select class="form-control" style="width:auto;font-size:var(--text-xs)" onchange="updateReportChart(this.value)">
              <option value="monthly">Monthly</option>
              <option value="quarterly">Quarterly</option>
              <option value="annual">Annual</option>
            </select>
          </div>
          <canvas id="reportRevenueChart" height="200"></canvas>
        </div>
        <div class="glass" style="padding:var(--sp-6)">
          <div class="section-header">
            <div class="section-title">Event Attendance</div>
          </div>
          <canvas id="reportAttendanceChart" height="200"></canvas>
        </div>
      </div>

      <!-- Filter bar + table -->
      <div class="glass" style="overflow:hidden;margin-bottom:var(--sp-6)">
        <div class="filter-bar">
          <input type="text" class="form-control" style="max-width:240px" placeholder="🔍  Search transactions…" id="reportSearch" oninput="filterReportTable()" />
          <select class="form-control" style="width:auto" id="reportType" onchange="filterReportTable()">
            <option value="">All Types</option>
            <option>Membership Dues</option>
            <option>Event Ticket</option>
            <option>Donation</option>
            <option>Sponsorship</option>
          </select>
          <select class="form-control" style="width:auto" id="reportStatus" onchange="filterReportTable()">
            <option value="">All Status</option>
            <option>Paid</option>
            <option>Pending</option>
            <option>Overdue</option>
            <option>Refunded</option>
          </select>
          <input type="date" class="form-control" style="width:auto" id="reportDateFrom" onchange="filterReportTable()" value="2025-01-01" />
          <input type="date" class="form-control" style="width:auto" id="reportDateTo"   onchange="filterReportTable()" value="2026-03-10" />
          <button class="btn btn-ghost btn-sm" onclick="resetReportFilters()">✕ Clear</button>
        </div>
        <div class="table-wrap">
          <table id="reportsTable"></table>
        </div>
        <div style="padding:var(--sp-4) var(--sp-6);border-top:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:var(--text-xs);color:var(--text-muted)" id="reportCount">Showing 10 of 248 transactions</span>
          <div style="display:flex;gap:var(--sp-2)">
            <button class="btn btn-ghost btn-sm">← Prev</button>
            <button class="btn btn-primary btn-sm">Next →</button>
          </div>
        </div>
      </div>

    </div>
  </div><!-- /screenReports -->


  <!-- ══ SCREEN 3 — CRUD MANAGEMENT ═══════════════════════ -->
  <div class="screen" id="screenCrud">
    <div class="page-content">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-6)">
        <div>
          <h2 id="crudHeading" style="font-family:var(--font-display);font-size:var(--text-2xl);font-weight:700;color:var(--text-primary)">Members</h2>
          <p id="crudSub" style="font-size:var(--text-sm);color:var(--text-muted);margin-top:4px">Manage member records, roles and memberships</p>
        </div>
        <div style="display:flex;gap:var(--sp-3)">
          <button class="btn btn-ghost" onclick="showToast('info','Importing…','Upload a CSV to bulk-import.')">⬆ Import CSV</button>
          <button class="btn btn-primary" id="crudAddBtn" onclick="openMemberDrawer(null)">+ Add Member</button>
        </div>
      </div>

      <!-- Alert -->
      <div class="alert alert-warning" style="margin-bottom:var(--sp-5)">
        <span class="alert-icon">⚠️</span>
        <div class="alert-body">
          <div class="alert-title">12 members have expired memberships</div>
          <div class="alert-msg">Send renewal reminders or update their status.</div>
        </div>
        <button class="btn btn-warning btn-sm" style="flex-shrink:0;background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.4);color:var(--warning)" onclick="showToast('success','Reminders sent!','Renewal emails dispatched to 12 members.')">Send Reminders</button>
      </div>

      <!-- Toolbar -->
      <div class="crud-toolbar">
        <input type="text" class="form-control" style="max-width:280px" placeholder="🔍  Search…" id="crudSearch" oninput="filterCrudTable()" />
        <select class="form-control" style="width:auto" id="crudFilterStatus" onchange="filterCrudTable()">
          <option value="">All Status</option>
          <option>Active</option>
          <option>Inactive</option>
          <option>Pending</option>
          <option>Expired</option>
        </select>
        <select class="form-control" style="width:auto" id="crudFilterType" onchange="filterCrudTable()">
          <option value="">All Types</option>
          <option>Premium</option>
          <option>Standard</option>
          <option>Student</option>
          <option>Honorary</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="resetCrudFilters()">✕ Clear</button>
        <div style="margin-left:auto;display:flex;gap:var(--sp-2)">
          <button class="btn btn-ghost btn-sm" id="viewGrid" onclick="setCrudView('grid')" title="Grid view">⊞</button>
          <button class="btn btn-ghost btn-sm" id="viewList" onclick="setCrudView('list')" title="List view">☰</button>
        </div>
      </div>

      <!-- Table -->
      <div class="glass" style="overflow:hidden;margin-bottom:var(--sp-5)" id="crudTableWrap">
        <div class="table-wrap">
          <table id="crudTable"></table>
        </div>
        <div style="padding:var(--sp-4) var(--sp-6);border-top:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:var(--text-xs);color:var(--text-muted)" id="crudCount">Showing 10 of 2,347</span>
          <div style="display:flex;gap:var(--sp-2)">
            <button class="btn btn-ghost btn-sm">← Prev</button>
            <button class="btn btn-primary btn-sm">Next →</button>
          </div>
        </div>
      </div>

      <!-- Grid view (hidden by default) -->
      <div id="crudGridWrap" style="display:none;margin-bottom:var(--sp-5)">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--sp-5)" id="crudGrid"></div>
      </div>

    </div>
  </div><!-- /screenCrud -->


  <!-- ══ SCREEN 4 — NOTIFICATIONS ════════════════════════ -->
  <div class="screen" id="screenNotifications">
    <div class="page-content">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-6)">
        <div>
          <h2 style="font-family:var(--font-display);font-size:var(--text-2xl);font-weight:700;color:var(--text-primary)">Notifications</h2>
          <p style="font-size:var(--text-sm);color:var(--text-muted);margin-top:4px">Stay up to date on association activity</p>
        </div>
        <div style="display:flex;gap:var(--sp-3)">
          <button class="btn btn-ghost" onclick="markAllRead()">✓ Mark all read</button>
          <button class="btn btn-ghost btn-sm" onclick="clearNotifications()">🗑 Clear all</button>
        </div>
      </div>

      <!-- Alert banners -->
      <div class="alert alert-danger" style="margin-bottom:var(--sp-3)" id="notifAlert1">
        <span class="alert-icon">🚨</span>
        <div class="alert-body">
          <div class="alert-title">Urgent: Payment gateway error</div>
          <div class="alert-msg">Stripe webhook failed 3 times. Investigate immediately or contact support.</div>
        </div>
        <button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:18px;align-self:flex-start;">✕</button>
      </div>
      <div class="alert alert-warning" style="margin-bottom:var(--sp-6)" id="notifAlert2">
        <span class="alert-icon">⚠️</span>
        <div class="alert-body">
          <div class="alert-title">SSL certificate expiring in 14 days</div>
          <div class="alert-msg">Renew your certificate before March 24, 2026 to avoid service interruption.</div>
        </div>
        <button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:var(--warning);font-size:18px;align-self:flex-start;">✕</button>
      </div>

      <!-- Filter -->
      <div class="glass" style="overflow:hidden">
        <div class="notif-filter">
          <div class="tab active" onclick="filterNotifs('all',this)">All <span class="nav-badge" style="position:static;margin-left:4px">5</span></div>
          <div class="tab" onclick="filterNotifs('unread',this)">Unread</div>
          <div class="tab" onclick="filterNotifs('system',this)">System</div>
          <div class="tab" onclick="filterNotifs('members',this)">Members</div>
          <div class="tab" onclick="filterNotifs('payments',this)">Payments</div>
        </div>
        <div id="notifList"></div>
      </div>

    </div>
  </div><!-- /screenNotifications -->

</template><!-- /allScreens -->


<!-- ══════════════════════════════════════════════════════
     MEMBER DRAWER
══════════════════════════════════════════════════════ -->
<div class="drawer-backdrop" id="memberDrawer">
  <div class="drawer glass" id="memberDrawerPanel">
    <div class="drawer-header">
      <div class="drawer-title" id="drawerTitle">Add New Member</div>
      <button onclick="closeDrawer()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);" aria-label="Close drawer">✕</button>
    </div>

    <div class="alert alert-info" id="drawerAlert" style="display:none;margin-bottom:var(--sp-5)">
      <span class="alert-icon">✅</span>
      <div class="alert-body"><div class="alert-title" id="drawerAlertMsg">Member saved.</div></div>
    </div>

    <form id="memberForm" novalidate onsubmit="saveMember(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label required">First Name</label>
          <input class="form-control" id="mFirst" placeholder="Shraddha" required />
          <div class="form-error" id="mFirstErr" style="display:none">⚠ Required</div>
        </div>
        <div class="form-group">
          <label class="form-label required">Last Name</label>
          <input class="form-control" id="mLast" placeholder="Kapoor" required />
          <div class="form-error" id="mLastErr" style="display:none">⚠ Required</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Email</label>
        <div class="input-group">

function filterReportTable() {
  const q  = (document.getElementById('reportSearch')?.value||'').toLowerCase();
  const tp = (document.getElementById('reportType')?.value||'');
  const st = (document.getElementById('reportStatus')?.value||'');
  const fd = document.getElementById('reportDateFrom')?.value||'';
  const td = document.getElementById('reportDateTo')?.value||'';
  const filtered = TRANSACTIONS.filter(r=>{
    if(q  && !r.member.toLowerCase().includes(q) && !r.id.toLowerCase().includes(q)) return false;
    if(tp && r.type !== tp) return false;
    if(st && r.status !== st) return false;
    if(fd && r.date < fd) return false;
    if(td && r.date > td) return false;
    return true;
  });
  buildReportsTable(filtered);
}

  document.getElementById('crudGridWrap').style.display  = v==='grid' ? '' : 'none';
  document.getElementById('viewGrid').classList.toggle('btn-primary', v==='grid');
  document.getElementById('viewList').classList.toggle('btn-primary', v==='list');
}
function filterCrudTable() {
  const q  = (document.getElementById('crudSearch')?.value||'').toLowerCase();
  const st = document.getElementById('crudFilterStatus')?.value||'';
  const tp = document.getElementById('crudFilterType')?.value||'';
  const filtered = MEMBERS.filter(m=>{
    if(q  && !m.name.toLowerCase().includes(q) && !m.email.toLowerCase().includes(q)) return false;
    if(st && m.status!==st) return false;
    if(tp && m.type!==tp) return false;
    return true;
  });
  buildCrudTable(filtered); buildCrudGrid(filtered);
}
function resetCrudFilters() {
  ['crudSearch','crudFilterStatus','crudFilterType'].forEach(id=>{ const el=document.getElementById(id); if(el)el.value=''; });
  buildCrudTable(MEMBERS); buildCrudGrid(MEMBERS);
}
function deleteMember(id) {
  const m = MEMBERS.find(x=>x.id===id);
  confirmDialog(`Delete member "${m?.name}"? This cannot be undone.`, () => {
    const i = MEMBERS.findIndex(x=>x.id===id);
    if(i>-1) MEMBERS.splice(i,1);
    buildCrudTable(MEMBERS); buildCrudGrid(MEMBERS);
    showToast('success','Member deleted',`${m?.name} has been removed.`);
  });
}
function selectAll(cb) {
  document.querySelectorAll('#crudTable tbody input[type=checkbox]').forEach(x=>x.checked=cb.checked);
}

/* ═══════════════════════════════════════
   NOTIFICATIONS
═══════════════════════════════════════ */
function initNotifications() { renderNotifList('all'); }
function filterNotifs(cat, el) {
  currentNotifFilter = cat;
  document.querySelectorAll('.notif-filter .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderNotifList(cat);
}
function renderNotifList(cat) {
  const el = document.getElementById('notifList');
  if (!el) return;
  const data = cat==='all' ? NOTIFICATIONS_DATA : NOTIFICATIONS_DATA.filter(n=>n.cat===cat || (cat==='unread'&&n.unread));
  if (!data.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-title">No notifications</div><div class="empty-sub">You're all caught up!</div></div>`;
    return;
  }
  el.innerHTML = data.map(n=>`
    <div class="notif-item ${n.unread?'unread':''}" onclick="readNotif(${n.id},this)">
      <div class="notif-avatar" style="background:${n.bg}">${n.icon}</div>
      <div class="notif-body">
        <div class="notif-title">${n.title}</div>
        <div class="notif-msg">${n.msg}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:var(--sp-2)">
        <div class="notif-time">${n.time}</div>
        ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0"></div>' : ''}
      </div>
    </div>`).join('');
}
function readNotif(id, el) {
  const n = NOTIFICATIONS_DATA.find(x=>x.id===id);
  if(n) { n.unread=false; el.classList.remove('unread'); }
  const dot = el.querySelector('[style*="border-radius:50%;background:var(--primary)"]');
  if(dot) dot.remove();
}
function markAllRead() {
  NOTIFICATIONS_DATA.forEach(n=>n.unread=false);
  renderNotifList(currentNotifFilter);
  showToast('success','All read','All notifications marked as read.');
}
function clearNotifications() {
  confirmDialog('Clear all notifications?', ()=>{
    NOTIFICATIONS_DATA.length=0;
    renderNotifList(currentNotifFilter);
    showToast('info','Cleared','Notification history cleared.');
  });
}

/* ═══════════════════════════════════════
   MEMBER DRAWER
═══════════════════════════════════════ */
function openMemberDrawer(id) {
  editingMemberId = id;
  const drawer = document.getElementById('memberDrawer');
  const title  = document.getElementById('drawerTitle');
  const alert  = document.getElementById('drawerAlert');
  alert.style.display='none';
  if(id) {
    const m = MEMBERS.find(x=>x.id===id);
    title.textContent = 'Edit Member';
    document.getElementById('mFirst').value  = m.name.split(' ')[0];
    document.getElementById('mLast').value   = m.name.split(' ').slice(1).join(' ');
    document.getElementById('mEmail').value  = m.email;
    document.getElementById('mPhone').value  = m.phone;
    document.getElementById('mType').value   = m.type;
    document.getElementById('mStatus').value = m.status;
    document.getElementById('mJoinDate').value=m.joined;
    document.getElementById('mNotes').value  = '';
  } else {
    title.textContent='Add New Member';
    document.getElementById('memberForm').reset();
    document.getElementById('mJoinDate').value='2026-03-10';
  }
  drawer.classList.add('show');
}
function closeDrawer() { document.getElementById('memberDrawer').classList.remove('show'); }
function saveMember(e) {
  e.preventDefault();
  const first = document.getElementById('mFirst').value.trim();
  const last  = document.getElementById('mLast').value.trim();
  const email = document.getElementById('mEmail').value.trim();
  let valid   = true;
  ['mFirstErr','mLastErr','mEmailErr'].forEach(id=>{ const el=document.getElementById(id); if(el)el.style.display='none'; });
  if(!first){document.getElementById('mFirstErr').style.display='flex';document.getElementById('mFirst').classList.add('error');valid=false;}else document.getElementById('mFirst').classList.remove('error');
  if(!last) {document.getElementById('mLastErr').style.display='flex';document.getElementById('mLast').classList.add('error');valid=false;}else document.getElementById('mLast').classList.remove('error');
  if(!email||!/^[^@]+@[^@]+\.[^@]+$/.test(email)){document.getElementById('mEmailErr').style.display='flex';document.getElementById('mEmail').classList.add('error');valid=false;}else document.getElementById('mEmail').classList.remove('error');
  if(!valid) return;
  const payload = {
    name:`${first} ${last}`, email,
    phone:document.getElementById('mPhone').value,
    type:document.getElementById('mType').value,
    status:document.getElementById('mStatus').value,
    joined:document.getElementById('mJoinDate').value,
    dues: 2400, avatar: `${first[0]}${last[0]}`, color:'#7C6EFA'
  };
  if(editingMemberId) {
    const i = MEMBERS.findIndex(x=>x.id===editingMemberId);
    if(i>-1) MEMBERS[i] = {...MEMBERS[i],...payload};
    showToast('success','Member updated',`${payload.name} has been updated.`);
  } else {
    MEMBERS.unshift({...payload, id: Date.now()});
    showToast('success','Member added',`${payload.name} added successfully.`);
  }
  buildCrudTable(MEMBERS); buildCrudGrid(MEMBERS); buildTopMembersTable();
  const alert = document.getElementById('drawerAlert');
  document.getElementById('drawerAlertMsg').textContent = editingMemberId ? 'Member updated successfully.' : 'New member added successfully.';
  alert.style.display='flex';
  setTimeout(()=>closeDrawer(), 1200);
}

function statusBadge(s) {
  const map = { Active:'success', Inactive:'muted', Pending:'warning', Expired:'danger', Paid:'success', Overdue:'danger', Refunded:'info' };
  return `<span class="badge badge-${map[s]||'muted'}">${s}</span>`;
}
function typeBadge(t) {
  return `<span class="badge badge-primary">${t}</span>`;
